name: Release Charts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package charts
        run: |
          mkdir -p .cr-release-packages
          for chart in charts/*/; do
            helm package "$chart" -d .cr-release-packages
          done

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Prepare gh-pages content in temp dir
          mkdir -p /tmp/gh-pages
          git fetch origin gh-pages && git archive origin/gh-pages | tar -x -C /tmp/gh-pages 2>/dev/null || true

          # Copy new chart packages and generate index
          cp .cr-release-packages/*.tgz /tmp/gh-pages/
          helm repo index /tmp/gh-pages --url https://rskdproduct.github.io/envhub-charts

          # Push to gh-pages
          cd /tmp/gh-pages
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Helm chart repository"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/RSKDProduct/envhub-charts.git" gh-pages
