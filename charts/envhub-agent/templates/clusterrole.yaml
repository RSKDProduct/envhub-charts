{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "envhub-agent.fullname" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
rules:
  # Read-only for inventory collection
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - endpoints
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - events
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
  # Write permissions for actions (scale, restart, delete)
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["update", "patch"]
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
    verbs: ["get", "update", "patch"]
{{- if and .Values.selfUpgrade .Values.selfUpgrade.enabled }}
  # Self-upgrade: agent needs to manage its own helm release resources
  - apiGroups: [""]
    resources:
      - secrets
      - serviceaccounts
      - services
      - configmaps
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs: ["create", "delete"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "bind", "escalate"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - servicemonitors
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
{{- end }}
