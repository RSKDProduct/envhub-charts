{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "envhub-agent.fullname" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "envhub-agent.fullname" . }}
    namespace: {{ include "envhub-agent.namespace" . }}
{{- end }}
