apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "envhub-agent.fullname" . }}
  namespace: {{ include "envhub-agent.namespace" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
data:
  STANDALONE: {{ .Values.standalone | quote }}
  SYNC_INTERVAL: {{ .Values.syncInterval | quote }}
  METRICS_PORT: {{ .Values.metricsPort | quote }}
  LOG_LEVEL: {{ .Values.logLevel | quote }}
  {{- if .Values.serverAddress }}
  SERVER_ADDRESS: {{ .Values.serverAddress | quote }}
  {{- end }}
  {{- if .Values.agentName }}
  AGENT_NAME: {{ .Values.agentName | quote }}
  {{- end }}
  {{- if .Values.executor.enabled }}
  RUNNER_ENABLED: "true"
  RUNNER_CONTAINER_NAME: "executor"
  {{- end }}
  HELM_RELEASE_NAME: {{ .Release.Name | quote }}
  HELM_RELEASE_NAMESPACE: {{ .Release.Namespace | quote }}
  {{- if .Values.chartRepo }}
  HELM_CHART_REPO: {{ .Values.chartRepo | quote }}
  {{- end }}
