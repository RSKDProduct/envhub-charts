apiVersion: apps/v1
kind: Deployment
{{- $livenessProbe := (get .Values "livenessProbe") | default (dict) }}
{{- $readinessProbe := (get .Values "readinessProbe") | default (dict) }}
{{- $startupProbe := (get .Values "startupProbe") | default (dict) }}
metadata:
  name: {{ include "envhub-agent.fullname" . }}
  namespace: {{ include "envhub-agent.namespace" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "envhub-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "envhub-agent.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "envhub-agent.fullname" . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envhub-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - "--token"
            - "$(ENROLLMENT_TOKEN)"
            - "--data-dir"
            - "/data"
          env:
            - name: ENROLLMENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "envhub-agent.fullname" . }}
                  key: enrollment-token
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: {{ include "envhub-agent.fullname" . }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: agent-data
              mountPath: /data
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet:
              path: /livez
              port: metrics
            initialDelaySeconds: {{ (get $livenessProbe "initialDelaySeconds") | default 10 }}
            periodSeconds: {{ (get $livenessProbe "periodSeconds") | default 30 }}
            timeoutSeconds: {{ (get $livenessProbe "timeoutSeconds") | default 3 }}
            failureThreshold: {{ (get $livenessProbe "failureThreshold") | default 3 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ (get $readinessProbe "initialDelaySeconds") | default 5 }}
            periodSeconds: {{ (get $readinessProbe "periodSeconds") | default 10 }}
            timeoutSeconds: {{ (get $readinessProbe "timeoutSeconds") | default 3 }}
            failureThreshold: {{ (get $readinessProbe "failureThreshold") | default 3 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ (get $startupProbe "initialDelaySeconds") | default 5 }}
            periodSeconds: {{ (get $startupProbe "periodSeconds") | default 5 }}
            timeoutSeconds: {{ (get $startupProbe "timeoutSeconds") | default 3 }}
            failureThreshold: {{ (get $startupProbe "failureThreshold") | default 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.executor.enabled }}
        - name: executor
          image: "{{ .Values.executor.image.repository }}:{{ .Values.executor.image.tag }}"
          imagePullPolicy: {{ .Values.executor.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["tail", "-f", "/dev/null"]
          resources:
            {{- toYaml .Values.executor.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.eventExporter.enabled }}
        - name: event-exporter
          image: "{{ .Values.eventExporter.image.repository }}:{{ .Values.eventExporter.image.tag }}"
          imagePullPolicy: {{ .Values.eventExporter.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - -conf=/etc/event-exporter/config.yaml
          volumeMounts:
            - name: event-exporter-config
              mountPath: /etc/event-exporter
              readOnly: true
          resources:
            {{- toYaml .Values.eventExporter.resources | nindent 12 }}
        {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: agent-data
          persistentVolumeClaim:
            claimName: {{ include "envhub-agent.fullname" . }}
        {{- end }}
        {{- if .Values.eventExporter.enabled }}
        - name: event-exporter-config
          configMap:
            name: {{ include "envhub-agent.fullname" . }}-event-exporter
        {{- end }}
