apiVersion: v1
kind: Service
metadata:
  name: {{ include "envhub-agent.fullname" . }}
  namespace: {{ include "envhub-agent.namespace" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "envhub-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metricsPort }}
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
