{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "envhub-agent.fullname" . }}
  namespace: {{ include "envhub-agent.namespace" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "envhub-agent.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
      path: /metrics
  namespaceSelector:
    matchNames:
      - {{ include "envhub-agent.namespace" . }}
{{- end }}
