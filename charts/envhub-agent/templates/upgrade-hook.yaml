{{- if and .Values.upgrade .Values.upgrade.actionId }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "envhub-agent.fullname" . }}-upgrade-confirm
  namespace: {{ include "envhub-agent.namespace" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 120
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "envhub-agent.fullname" . }}
      containers:
        - name: confirm
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              echo "Confirming upgrade: actionId=${ACTION_ID} version=${TARGET_VERSION}"
              TOKEN=$(cat /etc/upgrade-token/token)
              if [ -z "$TOKEN" ]; then
                echo "ERROR: Could not read upgrade token"
                exit 1
              fi
              curl -sf --retry 3 --retry-delay 5 -X POST \
                "${SERVER_URL}/api/v1/agents/${AGENT_ID}/confirm-upgrade" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "X-Tenant-Id: ${TENANT_ID}" \
                -d "{\"actionId\":\"${ACTION_ID}\",\"version\":\"${TARGET_VERSION}\"}"
              echo ""
              echo "Upgrade confirmed successfully"
          env:
            - name: SERVER_URL
              value: {{ .Values.upgrade.serverUrl | quote }}
            - name: AGENT_ID
              value: {{ .Values.upgrade.agentId | quote }}
            - name: TENANT_ID
              value: {{ .Values.upgrade.tenantId | quote }}
            - name: ACTION_ID
              value: {{ .Values.upgrade.actionId | quote }}
            - name: TARGET_VERSION
              value: {{ .Values.image.tag | quote }}
          volumeMounts:
            - name: upgrade-token
              mountPath: /etc/upgrade-token
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: upgrade-token
          secret:
            secretName: {{ include "envhub-agent.fullname" . }}-upgrade-token
{{- end }}
