{{- if and .Values.upgradeTokenSecret .Values.upgradeTokenSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-upgrade-token" (include "envhub-agent.fullname" .)) .Values.upgradeTokenSecret.existingSecret }}
  namespace: {{ include "envhub-agent.namespace" . }}
  labels:
    {{- include "envhub-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.upgradeTokenSecret.token | quote }}
{{- end }}
