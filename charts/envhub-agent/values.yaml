image:
  repository: ghcr.io/rskdproduct/envhub-agent
  tag: latest
  pullPolicy: Always

# Sidecar executor (Ubuntu + kubectl + helm) for running commands inside the cluster
executor:
  enabled: true
  image:
    repository: ghcr.io/rskdproduct/envhub-runner
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Event exporter sidecar — captures ALL K8s events and sends to the agent
eventExporter:
  enabled: true
  image:
    repository: ghcr.io/resmoio/kubernetes-event-exporter
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Required: Enrollment token from the EnvHub dashboard.
# Each token is single-use and embeds the server address automatically.
enrollmentToken: ""

# Optional: Override server address (smart token already includes this)
serverAddress: ""

# Optional: Human-readable display name for this agent (defaults to pod hostname)
agentName: ""

# Helm chart OCI repository for remote agent upgrades
chartRepo: "oci://envhubrskd.azurecr.io/helm"

# Agent configuration
logLevel: info
syncInterval: 15
metricsPort: 9090
standalone: false

# Namespace — set to true only if you want the chart to create the namespace resource.
# Usually unnecessary: use `helm install --namespace <ns> --create-namespace` instead.
namespace:
  create: false

# RBAC
rbac:
  create: true

# Self-upgrade: grants the agent permissions to manage its own helm release
# Required for the platform's remote agent upgrade feature
selfUpgrade:
  enabled: true

# Persistence for offline data buffer
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Prometheus ServiceMonitor (requires Prometheus Operator)
serviceMonitor:
  enabled: false
  interval: 15s

# Graceful shutdown — preStop hook sleeps 5s so K8s removes pod from endpoints
# before container stops, preventing false "Unhealthy" Warning events during rollouts
terminationGracePeriodSeconds: 30

# Liveness and readiness probes
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# Upgrade confirmation (set automatically by agent executor during helm upgrade)
# Do NOT set these manually — they are injected via --set during platform upgrades
upgrade:
  actionId: ""
  agentId: ""
  tenantId: ""
  serverUrl: ""
  token: ""
